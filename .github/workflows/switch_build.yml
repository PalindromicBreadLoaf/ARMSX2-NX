name: Switch Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'

  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Install Switch portlibs
        run: dkp-pacman -Sy --noconfirm switch-libpng switch-libjpeg-turbo

      - name: Configure
        run: |
          cmake -S app/src/main/cpp -B build/switch-core \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build/switch-core --target armsx2_nro -j$(nproc)

      - name: Locate
        id: locate
        run: |
          NRO_PATH=$(find build/switch-core -type f -name 'armsx2nx.nro' -print -quit)
          if [ -z "$NRO_PATH" ]; then
            echo "ERROR armsx2nx.nro not found."
            exit 1
          fi
          echo "NRO_PATH=$NRO_PATH" >> $GITHUB_OUTPUT
          echo "Built: $NRO_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: armsx2nx-nro
          path: ${{ steps.locate.outputs.NRO_PATH }}
